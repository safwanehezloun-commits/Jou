<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#050510">
  <meta name="description" content="NEON STORM — عاصفة النيون — تجربة قتالية فضائية بزخرفة عربية">
  <title>NEON STORM — عاصفة النيون</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Noto+Kufi+Arabic:wght@400;700;900&display=swap" rel="stylesheet" crossorigin="anonymous">
  <style>
    /* ============================================================
       NEON STORM — ULTIMATE ARABIC NEON UI — DESIGNED BY SAFWAN
       ============================================================ */
    :root {
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
      --neon-cyan: #00e5ff;
      --neon-pink: #ff2d95;
      --neon-gold: #ffd700;
      --neon-green: #00ff88;
      --neon-purple: #aa66ff;
      --bg-deep: #050510;
      --panel-bg: linear-gradient(180deg, #0a1628, #060d1a);
      --glass-bg: rgba(10, 20, 40, 0.65);
      --glass-border: rgba(0, 229, 255, 0.3);
      --glass-blur: 16px;
      --arabesque-opacity: 0.08;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg-deep);
      font-family: 'Rajdhani', 'Noto Kufi Arabic', sans-serif;
      color: #e0e0ff;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-drag: none;
      -webkit-overflow-scrolling: touch;
      position: fixed;
      inset: 0;
    }

    /* ---------- CANVAS LAYERS ---------- */
    canvas#c, canvas#arabesque-canvas {
      display: block;
      position: fixed;
      inset: 0;
      z-index: 0;
      will-change: transform;
      transform: translate3d(0,0,0);
    }
    canvas#arabesque-canvas {
      z-index: 1;
      pointer-events: none;
      opacity: var(--arabesque-opacity);
    }

    /* ---------- GLOBAL UI LAYER ---------- */
    .ui-layer {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }
    .ui-layer > * {
      pointer-events: auto;
    }

    /* ---------- LOADING SCREEN ---------- */
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: radial-gradient(ellipse at center, #0a0a20 0%, #020210 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 1.2s cubic-bezier(0.4,0,0.2,1);
    }
    #loading-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .load-title {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(32px, 7vw, 56px);
      background: linear-gradient(135deg, #00e5ff, #ff2d95, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 25px #00e5ff80);
      letter-spacing: 0.2em;
      margin-bottom: 20px;
      animation: loadPulse 2s ease-in-out infinite;
    }
    @keyframes loadPulse {
      0%, 100% { filter: drop-shadow(0 0 20px #00e5ff); }
      50% { filter: drop-shadow(0 0 40px #ff2d95); }
    }
    .load-bar-outer {
      width: clamp(220px, 60vw, 420px);
      height: 8px;
      background: #12122a;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: inset 0 0 12px rgba(0,0,0,0.8);
    }
    .load-bar-inner {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-gold));
      border-radius: 8px;
      transition: width 0.3s ease;
      box-shadow: 0 0 20px var(--neon-cyan);
    }
    .load-text {
      margin-top: 18px;
      font-size: clamp(14px, 2.8vw, 18px);
      color: #8899cc;
      letter-spacing: 0.1em;
      font-weight: 500;
    }
    .load-tips {
      margin-top: 35px;
      font-size: clamp(12px, 2.2vw, 15px);
      color: #557;
      max-width: 82vw;
      text-align: center;
      min-height: 24px;
      transition: opacity 0.5s ease;
      padding: 10px 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 8px;
      backdrop-filter: blur(4px);
    }

    /* ---------- MAIN MENU ---------- */
    #main-menu {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(8px, 1.6vh, 16px);
      background: transparent;
      transition: opacity 0.6s cubic-bezier(0.34,1.56,0.64,1), transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }
    #main-menu.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.88);
    }
    .mm-title {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(34px, 8vw, 64px);
      background: linear-gradient(180deg, #fff 0%, #00e5ff 80%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 30px #00e5ff99);
      letter-spacing: 0.15em;
      text-align: center;
    }
    .mm-title span {
      background: linear-gradient(180deg, #ffd700, #ff2d95);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .mm-sub {
      font-family: 'Noto Kufi Arabic', sans-serif;
      font-size: clamp(13px, 2.4vw, 18px);
      color: #8899cc;
      letter-spacing: 0.2em;
      margin-bottom: 10px;
    }
    .mm-xp {
      font-size: clamp(13px, 2.4vw, 16px);
      color: #00e5ffcc;
      margin-top: 8px;
      text-shadow: 0 0 10px #00e5ff;
    }
    .xp-bar-menu {
      width: clamp(220px, 60vw, 320px);
      height: 8px;
      background: #111;
      border-radius: 8px;
      margin: 8px auto;
      border: 1px solid #2a2a40;
      overflow: hidden;
    }
    .xp-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink));
      border-radius: 8px;
      transition: width 0.6s ease;
      box-shadow: 0 0 15px var(--neon-cyan);
    }
    .mm-daily {
      font-size: clamp(12px, 2vw, 14px);
      color: #ffd700aa;
      margin-top: 6px;
    }
    .mm-missions {
      font-size: clamp(11px, 1.8vw, 13px);
      color: #667;
      margin-top: 6px;
      text-align: center;
      max-width: 85vw;
    }
    .mm-streak {
      font-size: clamp(11px, 1.8vw, 13px);
      color: #ff8800;
      margin-top: 4px;
    }
    .menu-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
    }

    /* ---------- BUTTONS ---------- */
    .btn {
      font-family: 'Orbitron','Noto Kufi Arabic', monospace;
      font-weight: 700;
      font-size: clamp(13px, 2.4vw, 17px);
      color: #e0e0ff;
      background: linear-gradient(135deg, #0a1628, #0d1f3c);
      border: 1.5px solid #00e5ff40;
      border-radius: 12px;
      padding: clamp(10px, 1.8vh, 16px) clamp(20px, 4vw, 36px);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
      min-width: clamp(140px, 40vw, 220px);
      text-align: center;
      letter-spacing: 0.06em;
      touch-action: manipulation;
      -webkit-user-drag: none;
      user-select: none;
      backdrop-filter: blur(5px);
    }
    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 300%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transform: skewX(-20deg);
      transition: left 0.5s;
    }
    .btn:active::before {
      left: 100%;
    }
    .btn:active {
      border-color: var(--neon-cyan);
      background: linear-gradient(135deg, #0d1f3c, #152a50);
      transform: scale(0.94);
      box-shadow: 0 0 28px #00e5ff40;
    }
    .btn-primary {
      border-color: #00e5ff80;
      background: linear-gradient(135deg, #00e5ff15, #0d1f3c);
      color: var(--neon-cyan);
    }
    .btn-danger {
      border-color: #ff2d9580;
      color: var(--neon-pink);
    }
    .btn-gold {
      border-color: #ffd70080;
      color: var(--neon-gold);
    }
    .btn-sm {
      min-width: auto;
      padding: 8px 16px;
      font-size: clamp(11px, 1.9vw, 14px);
    }

    /* ---------- PANELS ---------- */
    .panel {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(5,5,16,0.88);
      backdrop-filter: blur(10px);
      transition: opacity 0.35s cubic-bezier(0.34,1.56,0.64,1), transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }
    .panel.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.92);
    }
    .panel-box {
      background: var(--glass-bg);
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: clamp(16px, 3vw, 30px);
      max-width: 94vw;
      max-height: 86vh;
      overflow-y: auto;
      width: clamp(290px, 80vw, 500px);
      text-align: center;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 30px rgba(0,229,255,0.2);
      scrollbar-width: thin;
      scrollbar-color: #ff2d9540 transparent;
    }
    .panel-box::-webkit-scrollbar {
      width: 4px;
    }
    .panel-box::-webkit-scrollbar-thumb {
      background: #ff2d9560;
      border-radius: 4px;
    }
    .panel-box h2 {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(18px, 4vw, 28px);
      background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: clamp(10px, 2vh, 18px);
    }
    .panel-close {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: transparent;
      border: 1px solid #ffffff20;
      color: #aaa;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      touch-action: manipulation;
      z-index: 5;
    }
    .panel-close:active {
      border-color: var(--neon-pink);
      color: var(--neon-pink);
      transform: scale(0.85);
    }

    /* ---------- SHOP ITEMS ---------- */
    .shop-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(10,16,32,0.8);
      border: 1px solid #ffffff10;
      border-radius: 14px;
      padding: 10px 14px;
      margin-bottom: 8px;
      gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
      backdrop-filter: blur(4px);
    }
    .shop-item:hover {
      border-color: #00e5ff40;
    }
    .shop-info {
      text-align: right;
      flex: 1;
    }
    .shop-info .name {
      font-weight: 700;
      font-size: clamp(13px,2.4vw,16px);
      color:#e0e0ff;
    }
    .shop-info .desc {
      font-size: clamp(10px,1.8vw,13px);
      color:#667;
      margin-top:3px;
    }
    .shop-cost {
      font-family:'Orbitron',monospace;
      font-weight:700;
      color:var(--neon-gold);
      font-size:clamp(12px,2.4vw,15px);
      white-space:nowrap;
    }
    .shop-btn {
      font-family:'Orbitron',monospace;
      font-weight:700;
      font-size:clamp(11px,1.9vw,13px);
      color:#050510;
      background:var(--neon-cyan);
      border:none;
      border-radius:8px;
      padding:6px 14px;
      cursor:pointer;
      transition:all 0.15s;
      touch-action:manipulation;
    }
    .shop-btn:active {
      background:#33eeff;
      transform:scale(0.91);
    }
    .shop-btn:disabled {
      opacity:0.3;
      cursor:default;
      transform:none;
      background:#333;
      color:#667;
    }

    /* ---------- SETTINGS ---------- */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #ffffff08;
      gap: 10px;
    }
    .setting-row label {
      font-size: clamp(13px,2.4vw,16px);
      color:#aab;
      flex:1;
      text-align:right;
    }
    .toggle {
      width: 44px;
      height: 24px;
      background: #222;
      border-radius: 12px;
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
      border: 1px solid #333;
      flex-shrink: 0;
    }
    .toggle.on {
      background: #00e5ff40;
      border-color: var(--neon-cyan);
    }
    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      width: 18px;
      height: 18px;
      background: #aaa;
      border-radius: 50%;
      transition: all 0.2s;
      right: 2px;
    }
    .toggle.on::after {
      right: 22px;
      background: var(--neon-cyan);
    }
    select, input[type=range] {
      background: #111;
      color: #e0e0ff;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: clamp(12px,2vw,14px);
      accent-color: var(--neon-cyan);
    }
    input[type=range] {
      height: 22px;
      min-width: 90px;
    }

    /* ---------- HUD ---------- */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 40;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
      font-family: 'Orbitron', monospace;
    }
    #hud.hidden {
      display: none;
    }
    .hud-left {
      text-align: right;
      pointer-events: auto;
    }
    .hud-right {
      text-align: left;
      pointer-events: auto;
    }
    .hud-score {
      font-weight: 900;
      font-size: clamp(16px,4vw,26px);
      color: #e0e0ff;
      text-shadow: 0 0 12px #00e5ff40;
    }
    .hud-combo {
      font-weight: 700;
      font-size: clamp(12px,2.4vw,16px);
      color: var(--neon-gold);
      text-shadow: 0 0 10px #ffd70040;
      display: none;
    }
    .hud-bombs {
      font-weight: 700;
      font-size: clamp(12px,2.4vw,15px);
      color: var(--neon-pink);
    }
    .hud-coins {
      font-weight: 700;
      font-size: clamp(12px,2.4vw,15px);
      color: var(--neon-gold);
    }
    .hud-xp {
      font-weight: 500;
      font-size: clamp(11px,2vw,14px);
      color: var(--neon-cyan);
    }
    .bar-container {
      width: clamp(120px,30vw,190px);
      height: clamp(8px,1.4vw,11px);
      background: #111;
      border-radius: 6px;
      overflow: hidden;
      margin-top: 4px;
      border: 1px solid #222;
    }
    .bar-fill {
      height: 100%;
      border-radius: 6px;
      transition: width 0.2s ease;
    }
    .hp-fill {
      background: linear-gradient(90deg,#00ff88,#00cc66);
    }
    .hp-fill.warn {
      background: linear-gradient(90deg,#ffd700,#ff8800);
    }
    .hp-fill.critical {
      background: linear-gradient(90deg,#ff4444,#cc0000);
    }
    .shield-fill {
      background: linear-gradient(90deg,#0088ff,#00aaff);
    }
    .wave-progress {
      width: clamp(100px,24vw,160px);
      height: 4px;
      background: #111;
      border-radius: 3px;
      margin-top: 4px;
    }
    .wave-fill {
      height: 100%;
      background: var(--neon-cyan);
      border-radius: 3px;
      transition: width 0.3s;
    }
    .powerup-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 4px;
      font-size: clamp(10px,2vw,13px);
      display: none;
    }
    .pu-icon {
      width: clamp(16px,3vw,22px);
      height: clamp(16px,3vw,22px);
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(10px,2vw,13px);
    }
    .pu-timer {
      width: clamp(40px,10vw,60px);
      height: 4px;
      background: #111;
      border-radius: 3px;
    }
    .pu-timer-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.2s;
    }

    /* ---------- TOUCH CONTROLS ---------- */
    #touch-controls {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      display: none;
      pointer-events: none;
    }
    #touch-controls.active {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }
    .joystick-zone {
      width: clamp(100px,28vw,150px);
      height: clamp(100px,28vw,150px);
      pointer-events: auto;
      position: relative;
      opacity: 0.45;
      transition: opacity 0.2s;
      margin-left: 14px;
    }
    .joystick-zone.active-ring {
      opacity: 0.8;
    }
    .joystick-base {
      position: absolute;
      inset: 0;
      border: 2px solid #00e5ff30;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,229,255,0.08) 0%, transparent 70%);
    }
    .joystick-knob {
      position: absolute;
      width: 40%;
      height: 40%;
      top: 30%;
      left: 30%;
      background: radial-gradient(circle, rgba(0,229,255,0.6), rgba(0,200,255,0.2));
      border: 2px solid #00e5ff80;
      border-radius: 50%;
      transition: transform 0.04s ease-out;
    }
    .touch-btn-group {
      display: flex;
      flex-direction: column;
      gap: clamp(8px,1.8vw,14px);
      align-items: flex-end;
      pointer-events: auto;
      margin-right: 14px;
    }
    .touch-btn {
      width: clamp(56px,14vw,76px);
      height: clamp(56px,14vw,76px);
      border-radius: 50%;
      border: 2px solid;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family:'Orbitron',monospace;
      font-weight:900;
      font-size: clamp(15px,3vw,20px);
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.1s, box-shadow 0.1s;
      position: relative;
      touch-action: manipulation;
    }
    .touch-btn:active {
      transform: scale(0.82);
    }
    .touch-btn.fire {
      border-color:#00e5ff80;
      background:#00e5ff15;
      color:var(--neon-cyan);
    }
    .touch-btn.bomb {
      border-color:#ff2d9580;
      background:#ff2d9515;
      color:var(--neon-pink);
      width: clamp(48px,12vw,64px);
      height: clamp(48px,12vw,64px);
    }
    .touch-btn.pause-btn {
      border-color:#ffffff40;
      background:#ffffff10;
      color:#aaa;
      width: clamp(40px,10vw,52px);
      height: clamp(40px,10vw,52px);
      font-size: clamp(13px,2.5vw,16px);
    }
    .touch-btn .bomb-count {
      position: absolute;
      bottom: -5px;
      right: -5px;
      font-size: clamp(9px,1.8vw,11px);
      background: var(--neon-pink);
      color: #fff;
      border-radius: 50%;
      width: clamp(16px,3.5vw,20px);
      height: clamp(16px,3.5vw,20px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ---------- OTHER OVERLAYS ---------- */
    .offscreen-arrow {
      position: fixed;
      z-index: 35;
      pointer-events: none;
      font-size: 22px;
      opacity: 0;
      transition: opacity 0.3s;
      text-shadow: 0 0 14px #ff2d95;
    }
    .offscreen-arrow.visible {
      opacity: 0.85;
    }
    .ach-toast {
      position: fixed;
      top: clamp(50px,9vh,80px);
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      z-index: 300;
      background: linear-gradient(135deg,#1a1000,#2a1800);
      border: 1px solid #ffd70060;
      border-radius: 16px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Orbitron','Noto Kufi Arabic',monospace;
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
